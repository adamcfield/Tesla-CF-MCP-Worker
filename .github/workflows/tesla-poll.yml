# Adaptive high-frequency vehicle poller — the mechanism that gives
# TeslaMate-grade history (full drive routes, speed curves, charge curves,
# state timeline, degradation, vampire drain) without any always-on server.
#
# TeslaMate records by polling the car every few seconds while it's active;
# this does the same, using free GitHub Actions compute (this repo is public,
# so Actions minutes are unlimited). Each run loops for ~4.5 minutes calling
# the worker's /poll/now, which does ONE billed vehicle_data read when the car
# is online and returns how long to wait before the next poll. The cadence is
# BUDGET-PACED by the worker (see budget.ts pacedDrivingIntervalS):
#   driving  -> 10s when at/ahead of the monthly budget pace, decaying
#               15s -> 30s -> 60s as the month's budget tightens
#   charging -> 60s when ahead of pace, else 150s
#   idle-online -> ~90s; asleep/offline/suspended -> the loop exits (no billed
#   reads; never wakes the car), and the next scheduled run picks back up.
#
# Cost: billed Tesla reads happen ONLY while the car is online. The worker's
# spend governor stops automated polling at $9/month, under Tesla's $10
# free-credit hard-stop — with no payment method on file, exceeding the credit
# disables the app, it can never bill. So the pacing spends the free credit
# for maximum fidelity while the $0 guarantee stays structural.
#
# FAIL-LOUD: a persistently broken worker (401/500/DNS) makes this run exit
# non-zero after 3 consecutive failed calls, so GitHub emails the owner
# instead of green runs silently recording nothing. The worker-side watchdog
# (rules.ts pollWatchdog) covers the complementary failure: this workflow not
# running at all.
#
# Requires the MCP_AUTH_TOKEN repo secret (already set) and the VIN below.

name: tesla-poll

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

concurrency:
  group: tesla-poll
  cancel-in-progress: false

env:
  WORKER: https://tesla-cf-mcp-worker.adamcfield.workers.dev
  VIN: LRW3E7ET1RC159967

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 58
    steps:
      - name: Keep the Durable Object poll scheduler armed
        # The DO alarm is the primary poller (fires reliably, self-rearms). This
        # re-arms it in the rare case its alarm chain ever broke, so the system
        # self-heals hourly. The loop below is a redundant backup poller — the
        # server-side billed-read dedup means running both never double-bills.
        run: |
          curl -sS --max-time 20 \
            -H "Authorization: Bearer ${{ secrets.MCP_AUTH_TOKEN }}" \
            "$WORKER/scheduler/start" || true
      - name: Adaptive poll loop
        run: |
          set -uo pipefail
          # Run CONTINUOUSLY for ~55 min (Actions minutes are unlimited on a
          # public repo). GitHub throttles the */5 schedule to ~hourly, so a
          # short 4.5-min run left the car unwatched ~55 min of every hour and
          # missed most drives. A ~55-min loop means back-to-back hourly runs
          # give near-continuous coverage. Budget-safe: the worker gates billed
          # reads (free connectivity checks when parked; billed vehicle_data only
          # when online + under the $9 governor; ~15-min probes while idle-online
          # so the car can still sleep). The concurrency group prevents overlap.
          DEADLINE=$(( $(date +%s) + 3300 ))
          consecutive_errors=0
          while [ "$(date +%s)" -lt "$DEADLINE" ]; do
            RESP=$(curl -sS --max-time 30 \
              -H "Authorization: Bearer ${{ secrets.MCP_AUTH_TOKEN }}" \
              "$WORKER/poll/now?vin=$VIN" || echo '')

            # Fail-loud accounting: an empty body, unparsable JSON, or an
            # {"error": ...} body counts as a failed call. Three in a row and
            # the run exits red — a dead worker must not look like a sleeping car.
            if OK=$(echo "$RESP" | python3 -c "
          import sys, json
          try:
              body = json.load(sys.stdin)
          except Exception:
              sys.exit(1)
          sys.exit(1 if (not body or body.get('error')) else 0)
          " 2>/dev/null); then
              consecutive_errors=0
            else
              consecutive_errors=$((consecutive_errors + 1))
              echo "::warning::poll call failed ($consecutive_errors consecutive): ${RESP:0:200}"
              if [ "$consecutive_errors" -ge 3 ]; then
                echo "::error::3 consecutive /poll/now failures — worker or token is broken"
                exit 1
              fi
              sleep 20
              continue
            fi

            STATE=$(echo "$RESP"  | python3 -c "import sys,json;print(json.load(sys.stdin).get('state','?'))" 2>/dev/null || echo '?')
            ACT=$(echo "$RESP"    | python3 -c "import sys,json;print(json.load(sys.stdin).get('activity','?'))" 2>/dev/null || echo '?')
            ACTIVE=$(echo "$RESP" | python3 -c "import sys,json;print(json.load(sys.stdin).get('active',False))" 2>/dev/null || echo 'False')
            IVAL=$(echo "$RESP"   | python3 -c "import sys,json;print(int(json.load(sys.stdin).get('next_interval_s',60)))" 2>/dev/null || echo 60)
            echo "$(date -u +%H:%M:%S)  state=$STATE activity=$ACT active=$ACTIVE next=${IVAL}s"

            # Keep watching the whole window even when parked/asleep: the free
            # connectivity check every cycle (worker returns next_interval_s =
            # 300s when inactive) costs nothing and is what catches the car
            # starting a drive. We do NOT exit early — that's exactly what left
            # the ~55-min gaps. When inactive, never sleep longer than 5 min so
            # a new drive is picked up promptly.
            if [ "$ACTIVE" != "True" ] && [ "$IVAL" -gt 300 ]; then IVAL=300; fi

            NOW=$(date +%s)
            REMAIN=$(( DEADLINE - NOW ))
            [ "$REMAIN" -le 0 ] && break
            [ "$IVAL" -lt 5 ] && IVAL=5
            [ "$IVAL" -gt "$REMAIN" ] && IVAL=$REMAIN
            sleep "$IVAL"
          done
