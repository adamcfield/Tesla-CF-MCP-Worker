# Mosquitto broker for the fleet-telemetry -> forwarder hop.
#
# SECURITY: this broker is intentionally anonymous. It is safe ONLY because
# docker-compose.yml does NOT publish port 1883 to the host — the broker is
# reachable exclusively on the internal compose network. If you ever publish
# 1883, add password_file / TLS first.

listener 1883
allow_anonymous true

# Persist QoS1 queues to disk so telemetry survives broker restarts and
# forwarder downtime (the forwarder subscribes with a durable session,
# clean_session=false).
persistence true
persistence_location /mosquitto/data/

# Bound the per-client queue so a long forwarder outage cannot fill the disk.
# 10000 messages ~= 40 min of full-rate driving telemetry at ~4 msgs/sec.
max_queued_messages 10000
