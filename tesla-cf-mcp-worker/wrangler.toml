# tesla-cf-mcp-worker — Cloudflare Workers MCP server for the Tesla Fleet API.
#
# Secrets (set with `wrangler secret put <NAME>`, never in this file):
#   TESLA_CLIENT_ID      — Tesla developer app client ID
#   TESLA_CLIENT_SECRET  — Tesla developer app client secret
#   TESLA_PRIVATE_KEY    — PEM EC (P-256) private key used for Vehicle Command signing
#   TESLA_REFRESH_TOKEN  — (optional seed) owner refresh token; rotated copies live in KV
#   MCP_AUTH_TOKEN       — shared secret gating /mcp (Claude Code bearer / claude.ai OAuth)
#   INGEST_TOKEN         — (optional) separate bearer for POST /ingest/telemetry
#   WEBHOOK_SECRET       — (optional) x-webhook-token header on outbound alert webhooks

name = "tesla-cf-mcp-worker"
main = "src/index.ts"
compatibility_date = "2025-05-05"

# Automation engine tick (price/solar charging, scheduled preconditioning,
# wake alerts). Only free connectivity checks by default — billed vehicle_data
# polls happen solely for rules with "allow_poll": true.
[triggers]
crons = ["*/15 * * * *"]

[[kv_namespaces]]
binding = "TESLA_KV"
id = "5e83ba18debc4f84a8a54ebd23bb880e" # wrangler kv namespace create TESLA_KV

[[d1_databases]]
binding = "DB"
database_name = "tesla-cf-mcp-worker"
database_id = "60b5405f-783e-4cb5-9197-562db099a6b9" # wrangler d1 create tesla-cf-mcp-worker

[vars]
# Fleet API region: "na", "eu" or "cn". Must match where the account/vehicles live.
TESLA_REGION = "eu"
# Public origin this Worker is served from. Used for OAuth redirect URIs and the
# partner-account domain registration. Set to your custom domain once routed.
PUBLIC_ORIGIN = "https://tesla-cf-mcp-worker.adamcfield.workers.dev"
# Automated-polling spend cap (USD/month). Uses most of Tesla's free $10 credit;
# billed reads pause here (never a charge — Tesla suspends past $10) and resume on the 1st.
BUDGET_POLL_USD = "9"
# Pause billed idle probes overnight (UTC hours). 21-3 = 00:00–06:00 Israel time.
# Active driving/charging is still recorded; only the every-15-min idle probe pauses.
QUIET_HOURS_UTC = "21-3"
# IANA zone for night-scoring, monthly buckets, DST-aware schedules.
DEFAULT_TZ = "Asia/Jerusalem"

# Workers AI (Llama, free tier) — powers Ask-Tessa, proactive briefings, coach notes.
[ai]
binding = "AI"
